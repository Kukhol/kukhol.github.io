<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Not Found</title>
</head>
<body>

<script>
  const path = window.location.pathname;

  // 🚨 IMPORTANT: allow .well-known to pass through
  if (path.startsWith("/.well-known")) {
    window.location.href = path;
  } else {
    window.location.href = "/index.html";
  }
</script>

</body>
</html>
