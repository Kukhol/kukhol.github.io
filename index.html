<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening BuyLists...</title>
</head>

<body style="font-family: sans-serif; text-align: center; padding-top: 80px;">

  <h2>🛒 Grocery List</h2>
  <p id="status">Opening your list...</p>

  <button id="openBtn" style="
    padding: 14px 24px;
    font-size: 16px;
    background: orange;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
  ">
    Open in BuyLists
  </button>

<script>
  function getListId() {
    const path = window.location.pathname;

    if (path.startsWith("/list/")) {
      return path.split("/list/")[1];
    }

    return null;
  }

  const listId = getListId();
  const btn = document.getElementById("openBtn");
  const status = document.getElementById("status");

  console.log("Detected List ID:", listId);

  if (!listId) {
    status.innerText = "Invalid link";
  } else {
    const deepLink = `buylists://list/${listId}`;

    // Button click opens app
    btn.onclick = () => {
      window.location.href = deepLink;
    };

    // Optional: auto open app after 1 sec
    setTimeout(() => {
      window.location.href = deepLink;
    }, 1000);
  }
</script>

</body>
</html>
