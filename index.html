<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening BuyLists...</title>
</head>

<body style="font-family: sans-serif; text-align: center; padding-top: 80px;">

  <h2>🛒 Grocery List</h2>
  <p id="status">Opening your list...</p>

  <button id="openBtn" style="
    padding: 14px 24px;
    font-size: 16px;
    background: orange;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
  ">
    Open in BuyLists
  </button>

<script>
  function getListId() {
    const path = window.location.pathname;
    const params = new URLSearchParams(window.location.search);

    // ✅ Case 1: /list/<id>
    if (path.startsWith("/list/")) {
      return path.split("/list/")[1];
    }

    // ✅ Case 2: ?rec=<id>
    if (params.has("rec")) {
      return params.get("rec");
    }

    return null;
  }

  const listId = getListId();
  const btn = document.getElementById("openBtn");
  const status = document.getElementById("status");

  console.log("Detected List ID:", listId);

  if (!listId) {
    status.innerText = "Invalid link";
  } else {
    status.innerText = "Opening your list...";

    const deepLink = buylists://list/${listId};

    btn.onclick = () => {
      window.location.href = deepLink;
    };

    // Auto open
    setTimeout(() => {
      window.location.href = deepLink;
    }, 1000);
  }
</script>

</body>
</html>
