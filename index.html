<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening BuyLists...</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 80px;">

  <h2>🛒 Grocery List</h2>
  <p>Opening your list...</p>

  <button onclick="openApp()" style="
    padding: 14px 24px;
    font-size: 16px;
    background: orange;
    border: none;
    border-radius: 10px;
    color: white;
  ">
    Open in BuyLists
  </button>

 <script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect');

  if (!redirect) return;

  // Extract list ID from /list/<id>
  const match = redirect.match(/\/list\/(.+)/);
  if (!match) return;

  const listId = match[1];

  // 🔥 Redirect to HTTPS app link (App Links will open app)
  const appLink = "https://kukhol.github.io/list/" + listId;

  window.location.href = appLink;
})();
</script>

</body>
</html>
