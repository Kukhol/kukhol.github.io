<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening BuyLists...</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 80px;">

  <h2>🛒 Grocery List</h2>
  <p>Opening your list...</p>

  <button onclick="openApp()" style="
    padding: 14px 24px;
    font-size: 16px;
    background: orange;
    border: none;
    border-radius: 10px;
    color: white;
  ">
    Open in BuyLists
  </button>

  <script>
    function getListId() {
      const urlParams = new URLSearchParams(window.location.search);

      // Handle redirect from 404
      const redirectPath = urlParams.get("redirect");

      let path = redirectPath || window.location.pathname;

      if (path.startsWith("/list/")) {
        return path.split("/list/")[1];
      }

      return null;
    }

    function openApp() {
      const id = getListId();
      if (!id) return;

      const appUrl = "buylists://list/" + id;
      const storeUrl = "https://play.google.com/store/apps/details?id=com.kukholapps.buylists";

      // Try opening app
      const iframe = document.createElement("iframe");
      iframe.style.display = "none";
      iframe.src = appUrl;
      document.body.appendChild(iframe);

      // Fallback to Play Store
      setTimeout(() => {
        window.location.href = storeUrl;
      }, 1200);
    }

    // Auto trigger
    window.onload = function () {
      setTimeout(openApp, 300);
    };
  </script>

</body>
</html>
