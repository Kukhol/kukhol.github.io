<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening BuyLists...</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 80px;">

  <h2>🛒 Grocery List</h2>
  <p>Opening your list...</p>

  <button onclick="openApp()" style="
    padding: 14px 24px;
    font-size: 16px;
    background: orange;
    border: none;
    border-radius: 10px;
    color: white;
  ">
    Open in BuyLists
  </button>

<script>
  function getListId() {
    const path = window.location.pathname;

    // Handles: /list/<id>
    if (path.startsWith("/list/")) {
      return path.split("/list/")[1];
    }

    return null;
  }

  const listId = getListId();

  console.log("Detected List ID:", listId);

  // Update button link
  const btn = document.getElementById("openBtn");
  if (btn && listId) {
    btn.href = `buylists://list/${listId}`; // deep link to app
  }
</script>

</body>
</html>
